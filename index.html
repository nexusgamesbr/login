function submitAnimation() {
  const frameWidth = 200; // largura de CADA frame
  const frameHeight = 200; // altura de CADA frame
  const totalFrames = 17; // número total de frames
  const animationDuration = 500; // duração total em ms
  const frameDuration = animationDuration / totalFrames; // tempo de cada frame

  const srcDaSprite = "imagens/fire.png";

  // 1. Pré-carregamento do Áudio usando Promise
  const audio = new Audio('hit.mp3');
  audio.load();
  const carregarAudio = new Promise((resolve) => {
    audio.addEventListener('canplaythrough', () => resolve(), { once: true });
  });

  // 2. Pré-carregamento da Imagem usando Promise
  const imgPrecarregada = new Image();
  const carregarImagem = new Promise((resolve, reject) => {
    imgPrecarregada.onload = () => resolve();
    imgPrecarregada.onerror = () => reject(new Error("Erro ao carregar a sprite do fogo."));
    imgPrecarregada.src = srcDaSprite;
  });

  // 3. Aguarda ambos carregarem antes de executar a ação
  Promise.all([carregarAudio, carregarImagem])
    .then(() => {
      // Toca o áudio imediatamente
      audio.play();

      // Cria a imagem da animação na tela
      const animationImg = document.createElement("img");
      animationImg.src = srcDaSprite;
      animationImg.style.position = "absolute";
      animationImg.style.width = frameWidth + "px";
      animationImg.style.height = frameHeight + "px";
      animationImg.style.left = "80%";
      animationImg.style.top = "80%";
      animationImg.style.transform = "translate(-50%, -50%)"; // Centraliza perfeitamente
      animationImg.style.objectFit = "cover"; // Garante que o frame corte no tamanho certo
      animationImg.style.zIndex = "1000"; // Garante que fique acima de outros elementos

      // Adiciona a imagem DENTRO do botão
      const botaoEnter = document.querySelector('.enter');
      if (botaoEnter) {
        botaoEnter.appendChild(animationImg);
      }

      let currentFrame = 0;

      // Loop da animação
      const animationInterval = setInterval(() => {
        if (currentFrame >= totalFrames) {
          clearInterval(animationInterval); // Para a animação no último frame
          animationImg.remove(); // Remove o elemento da tela após o fim
          return;
        }

        // Move a posição da imagem para mostrar o próximo frame
        const xPosition = -(currentFrame * frameWidth);
        animationImg.style.objectPosition = `${xPosition}px 0px`;

        currentFrame++;
      }, frameDuration);
    })
    .catch((erro) => {
      console.error("Falha ao iniciar animação:", erro);
    });
}

// Railgun
// Adiciona o evento de clique no background (mude para document.body ou o seletor da sua div de fundo)
document.addEventListener('click', (elemento) => {
  // Evita disparar se o usuário clicar em cima de um botão ou outro elemento interativo
  if (elemento.target !== document.body && !elemento.target.classList.contains('background')) {
    return; 
  }

  const cliqueX = elemento.clientX;
  const cliqueY = elemento.clientY;

  executarEfeitoClique(cliqueX, cliqueY);
});
let playing = false; // Variável para controlar se o efeito está aconteceno
function executarEfeitoClique(x, y) {
 if (playing) return; // Se já estiver tocando, não faz nada
  playing = true; // Marca que o efeito começou
  const frameWidth = 128; // largura de CADA frame
  const frameHeight = 128; // altura de CADA frame
  const totalFrames = 11; // número total de frames
  const animationDuration = 500; // duração total da animação em ms
  const frameDuration = animationDuration / totalFrames;
  const tempoEsperaAnimacao = 1060; // tempo em ms para a animação começar APÓS o áudio
  const tempoFadeDecal = 10000; // tempo que a imagem 'decal' leva para sumir (2 segundos)

  const srcDaSprite = "imagens/rings.png";
  const srcDecal = "imagens/decal.png";

  // 1. Pré-carregamento do Áudio
  const audio = new Audio('railgun.mp3');
  audio.load();
  const carregarAudio = new Promise((resolve) => {
    audio.addEventListener('canplaythrough', () => resolve(), { once: true });
  });

  // 2. Pré-carregamento da Imagem da animação
  const imgPrecarregada = new Image();
  const carregarImagem = new Promise((resolve, reject) => {
    imgPrecarregada.onload = () => resolve();
    imgPrecarregada.onerror = () => reject(new Error("Erro ao carregar a sprite do fogo."));
    imgPrecarregada.src = srcDaSprite;
  });

  // 3. Pré-carregamento da Imagem Decal
  const imgDecalPre = new Image();
  const carregarDecal = new Promise((resolve, reject) => {
    imgDecalPre.onload = () => resolve();
    imgDecalPre.onerror = () => reject(new Error("Erro ao carregar decal.png"));
    imgDecalPre.src = srcDecal;
  });

  // 3. Executa após o carregamento de ambos
  Promise.all([carregarAudio, carregarImagem, carregarDecal])
    .then(() => {
      // Toca o áudio IMEDIATAMENTE
      audio.play();

      // Aguda o "certo tempo" com o áudio ainda rolando para soltar a animação
      setTimeout(() => {
        // --- CRIANDO A IMAGEM DECAL (A que vai sumir) ---
        const decalImg = document.createElement("img");
        decalImg.src = srcDecal;
        decalImg.style.position = "fixed";
        decalImg.style.left = `${x}px`;
        decalImg.style.top = `${y}px`;
        decalImg.style.transform = "translate(-50%, -50%)"; // Centraliza no clique
        decalImg.style.zIndex = "999"; // Fica logo abaixo da animação de fogo
        decalImg.style.pointerEvents = "none";
        
        // Configura o Fade Out do Decal
        decalImg.style.transition = `opacity ${tempoFadeDecal}ms ease-out`;
        decalImg.style.opacity = "1";
        
        document.body.appendChild(decalImg);

        // Inicia o efeito de sumir do decal no próximo frame do navegador
        requestAnimationFrame(() => {
          decalImg.style.opacity = "0";
        });

        // Remove o decal do HTML após terminar o tempo do fade
        setTimeout(() => {
          decalImg.remove();
        }, tempoFadeDecal);

        // Cria a imagem da animação
        const animationImg = document.createElement("img");
        animationImg.src = srcDaSprite;
        
        // Estilização dinâmica baseada na posição do clique
        animationImg.style.position = "fixed";
        animationImg.style.left = `${x}px`;
        animationImg.style.top = `${y}px`;
        animationImg.style.width = frameWidth + "px";
        animationImg.style.height = frameHeight + "px";
        animationImg.style.transform = "translate(-50%, -50%)"; // Centraliza no ponto exato do clique
        animationImg.style.objectFit = "cover";
        animationImg.style.zIndex = "1000";
        animationImg.style.pointerEvents = "none"; // Impede que a imagem mude o alvo de cliques futuros
        
        // Adiciona o elemento direto no corpo da página
        document.body.appendChild(animationImg);

        let currentFrame = 0;

        // Loop da animação da Sprite Sheet
        const animationInterval = setInterval(() => {
          if (currentFrame >= totalFrames) {
            clearInterval(animationInterval);
            animationImg.remove(); // Remove do HTML quando invisível/finalizado
            playing = false; // Marca que o efeito terminou
            return;
          }

          // Move a posição da imagem para mostrar o próximo frame
          const xPosition = -(currentFrame * frameWidth);
          animationImg.style.objectPosition = `${xPosition}px 0px`;

          currentFrame++;
        }, frameDuration);
        }, tempoEsperaAnimacao); // Tempo de atraso configurado na variável acima
    })
    .catch((erro) => {
      console.error("Falha ao iniciar o efeito visual:", erro);
    });

}

// Função auxiliar
async function enviarDados(url, dados) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });
  return res.json(); // interpreta como objeto JSON
}
