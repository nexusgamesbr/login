<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sala Do Futuro Aluno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('bg.png');
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-image: url("grey.jpg");
      padding: 40px;
      border-radius: 0.375rem;
      border: 0.0625rem solid transparent;
      box-shadow: black 0px 0px 0.3rem 0.1rem inset;
      width: 300px;
      min-height: 150px;
      height: auto;
      text-align: center;
      position: relative;
    }
    h2 {
      color: #6a1b9a;
      margin-bottom: 20px;
    }
    input {
      width: 75%;
      padding: 6px;
      background: linear-gradient(rgb(0, 0, 0) 0%, rgba(0, 0, 0, 0.7) 100%) padding-box padding-box, linear-gradient(rgba(255, 255, 255, 0.25) 0%, rgb(255, 255, 255) 100%) border-box border-box;
      margin: 10px 0;
      color: #f0f0f0;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: #585858;
      outline: none;
    }
    button {
      width: 30%;
      padding: 12px;
      margin-top: 10px;
      margin-left: 220px;
      border-radius: 6px;
      border: none;
      background-image: url("dark_grey.jpg");
      border-image: url("button2.svg") 10 stretch;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    @font-face {
        font-family: "fonte";
        src: url(fonte.woff2) format("woff2");
    }
    @font-face {
        font-family: "fonte2";
        src: url(fonte2.woff2) format("woff2");
    }
    button:hover {
      background: #201c22;
    }
    .toggle {
      margin-top: 15px;
      color: #00f128;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      color: #fff;
      display: none;
    }
    .message.success {
      display: block;
      background: #2d7a2d;
    }
    .message.error {
      display: block;
      background: #a12a2a;
    }
    .message {
      width: 300px;
      margin: 10px auto 0;
      text-align: center;
      word-break: break-word;
    }
    .hidden {
      display: none !important;
    }
    .MainButton {
    position: absolute;
    color: #f0f0f0;
    top: -2.05rem;
    font-family: "fonte2";
    left: 50%;
    top: -13%;
    transform: translate(-50%);
    z-index: 10;
    box-sizing: border-box;
    min-width: 10rem;
    padding: 0.5rem 0.625rem;
    white-space: nowrap;
    display: flex;
    -webkit-box-pack: center;
    justify-content: center;
    -webkit-box-align: center;
    align-items: center;
    background: url("dark_grey.jpg") padding-box padding-box, linear-gradient(rgba(255, 255, 255, 0.25) 0%, rgba(0, 0, 0, 0.5) 100%) border-box border-box;
    border-radius: 0.4375rem 0.4375rem 0.4375rem 0px;
    border-top-left-radius: 0.4375rem;
    border-top-right-radius: 0.4375rem;
    border-bottom-right-radius: 0.4375rem;
    border-bottom-left-radius: 0px;
    border-image-width: 0.75rem;
    border-image-slice: 10;
    border-image-repeat: unset;
    border-image-source: url(button.svg);
    }
    h4 {
      color: #ffffff;
      margin-right: 300px;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 35%;
      height: 10%;
      background-image: url("grey.jpg");
      border-radius: 0.375rem;
      border: 1px solid black;
      box-shadow: black 0px 0px 0.3rem 0.1rem inset;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      font-size: 24px;
      color: #f0f0f0;
      font-family: "fonte2";
      transition: opacity 0.5s ease-out;
      padding: 100px;
      gap: 10px;
    }
    .main-img {
      width: 660px;
      height: 200px;
      border-radius: 0.375rem;
      border: 0.0625rem solid transparent;
      box-shadow: black 0px 0px 0.3rem 0.1rem inset;
      border-inline: 0.0625rem solid transparent;
      border-color: #fff;
      margin-top: 0px;
      margin-top: -10px;
    }
    .loading-img {
      width: 660px;
      height: 40px;
      margin-top: 0px;
    }
    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .container.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <img class="main-img" src="image.png" alt="Carregando...">
    <img class="loading-img" src="loading.gif" alt="Carregando...">
  </div>
  
  <div class="container">
    <!-- Formulário de Login -->
    <div class="MainButton"><strong>ENTRAR</strong></div>
    <div id="loginSection">
      <div class="toggle" onclick="toggleForms()">Não tem conta? Cadastre-se</div>
      <form id="loginForm" action="/login" method="POST" onsubmit="return false;">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>
      
    </div>

    <!-- Formulário de Cadastro -->
    <div id="registerSection" class="hidden">
      <div class="MainButton"><strong>CRIAR CONTA</strong></div>
      <div class="toggle" onclick="toggleForms()">Já tem conta? Faça login</div>
      <form id="criarForm" action="/registrar" method="POST" onsubmit="return false;">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Registrar</button>
      </form>
      
    </div>

  </div>
  <div id="message" class="message"></div>

  <script>
    // Menu de carregamento
    const loadingScreen = document.getElementById("loading");
    const container = document.querySelector(".container");

    // Container começa invisível
    container.classList.add("hidden");

    // Após 5 segundos, esconder o loading e mostrar o container
    setTimeout(() => {
      loadingScreen.classList.add("hidden");
      container.classList.remove("hidden");
    }, 6000);

    function toggleForms() {
      document.getElementById("loginSection").classList.toggle("hidden");
      document.getElementById("registerSection").classList.toggle("hidden");
    }

    // Sistema de aleatorização de main-img
    const images = ["image.png", "image2.png", "image3.png", "image4.png", "image5.png", "image6.png", "image7.png", "image8.png", "image9.png", "image10.png", "image11.png", "image12.png", "image13.png", "image14.png", "image15.png", "image16.png"];
    const mainImgElement = document.querySelector(".main-img");

    function getRandomImage() {
      return images[Math.floor(Math.random() * images.length)];
    }

    // Muda a imagem a cada 2 segundos
    setInterval(() => {
      mainImgElement.src = getRandomImage();
    }, 2000);

    // Muda a primeira imagem imediatamente
    mainImgElement.src = getRandomImage();
  </script>
  <script>
  const API_URL = "https://login-nqot.onrender.com";

// Cadastro
document.getElementById("criarForm").addEventListener("submit", async e => {
  e.preventDefault();
  const nome = e.target.nome.value.trim();
  const senha = e.target.senha.value;
  const resposta = await enviarDados(`${API_URL}/registrar`, { nome, senha });

  alert(resposta.mensagem || resposta);

  if (resposta.ok || (resposta.mensagem+"").toLowerCase().includes("sucesso")) {
    localStorage.setItem("token", resposta.token);
    localStorage.setItem("usuarioLogado", nome);
    localStorage.setItem("isAdmin", resposta.isAdmin);
    window.location.href = "https://neeexusbr.github.io/games";
  }
});


// Login
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const nome = e.target.nome.value.trim();
  const senha = e.target.senha.value;
  const resposta = await enviarDados(`${API_URL}/login`, { nome, senha });

  alert(resposta.mensagem); // mostra a mensagem do servidor

  if (resposta.ok) {
    localStorage.setItem("token", resposta.token);
    localStorage.setItem("usuarioLogado", nome);
    localStorage.setItem("isAdmin", resposta.isAdmin);
    window.location.href = "https://neeexusbr.github.io/games";
  } else {
    alert(resposta.mensagem || "Erro no login");
  }
});


// Função auxiliar
async function enviarDados(url, dados) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });
  return res.json(); // interpreta como objeto JSON
}



  // Mostrar quem está logado (sem alert)
  const usuario = localStorage.getItem("usuarioLogado");
  if (usuario) {
    document.body.insertAdjacentHTML("beforeend", `<p>Usuário logado: ${usuario}</p>`);
  }
</script>

</body>
</html>
